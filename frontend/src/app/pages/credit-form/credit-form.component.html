<div class="card">
  <div class="card-header">
    <h2>Registro de Crédito</h2>
    <p>Complete la información del cliente</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">

    <div class="form-group">
      <label>Nombre del Cliente</label>
      <input type="text" formControlName="client_name">
    </div>

    <div class="form-group">
      <label>Cédula / ID</label>
      <input type="text" formControlName="client_id">
    </div>

    <div class="form-group">
      <label>Valor del Crédito</label>
      <input type="number" formControlName="amount">
    </div>

    <div class="form-group">
      <label>Tasa de Interés (%)</label>
      <input type="number" formControlName="interest">
    </div>

    <div class="form-group">
      <label>Plazo (meses)</label>
      <input type="number" formControlName="term_months">
    </div>

    <div class="form-group">
      <label>Comercial</label>
      <input type="text" formControlName="commercial_name">
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="form.invalid">
        Registrar Crédito
      </button>
    </div>

  </form>
</div>
