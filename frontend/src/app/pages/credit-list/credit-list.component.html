<div class="table-card">
  <div class="table-header">
    <h2>Créditos Registrados</h2>
  </div>

  <div class="filters">
    <input placeholder="Nombre" [(ngModel)]="filters.client_name">
    <input placeholder="Cédula" [(ngModel)]="filters.client_id">
    <input placeholder="Comercial" [(ngModel)]="filters.commercial_name">

    <select [(ngModel)]="filters.sort">
      <option value="">Ordenar por Fecha</option>
      <option value="amount">Ordenar por Valor</option>
    </select>

    <button (click)="load()">Buscar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Cédula</th>
        <th>Valor</th>
        <th>Interés</th>
        <th>Plazo</th>
        <th>Comercial</th>
        <th>Fecha</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of credits">
        <td>{{c.client_name}}</td>
        <td>{{c.client_id}}</td>
        <td>{{c.amount | currency:'COP'}}</td>
        <td>{{c.interest}}%</td>
        <td>{{c.term_months}}</td>
        <td>{{c.commercial_name}}</td>
        <td>{{c.created_at | date:'short'}}</td>
      </tr>
    </tbody>
  </table>
</div>
